<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAE Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.cn">
    <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
    <link href="https://fonts.googleapis.cn/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #f5efe6;
            --bg-sand: #efe4d4;
            --bg-card: #fffaf2;
            --text-ink: #1a1a1a;
            --text-muted: #5b5246;
            --text-faint: #8a8174;
            --accent-coral: #e26d5c;
            --accent-olive: #6b705c;
            --accent-sky: #3a86ff;
            --accent-teal: #2a9d8f;
            --border: #e2d4c3;
            --shadow: 0 10px 30px rgba(26, 26, 26, 0.08);

            --font-display: 'Space Grotesk', system-ui, sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;

            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 0.75rem;
            --space-lg: 1rem;
            --space-xl: 1.5rem;
            --space-2xl: 2.25rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-display);
            background: radial-gradient(1200px 600px at 10% 0%, #fff6e8, var(--bg-cream));
            color: var(--text-ink);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .top-banner {
            background: var(--accent-coral);
            color: #fff;
            padding: 6px var(--space-2xl);
            font-size: 0.8rem;
            font-weight: 600;
            display: none;
            justify-content: center;
            align-items: center;
            gap: var(--space-sm);
            flex-shrink: 0;
        }

        .top-banner.show { display: flex; }

        .header {
            padding: var(--space-lg) var(--space-2xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg, #fffdf8 0%, #f8efe3 100%);
            flex-shrink: 0;
        }

        .header-left { display: flex; flex-direction: column; gap: 2px; }
        .header-title { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; }
        .header-subtitle { font-size: 0.75rem; color: var(--text-faint); font-family: var(--font-mono); }

        .header-right { display: flex; align-items: center; gap: var(--space-md); }
        .status-chip { font-size: 0.7rem; font-family: var(--font-mono); padding: 4px 8px; border-radius: 999px; font-weight: 600; }
        .status-chip.online { background: rgba(42, 157, 143, 0.15); color: var(--accent-teal); }
        .status-chip.degraded { background: rgba(226, 109, 92, 0.15); color: var(--accent-coral); }
        .status-chip.offline { background: rgba(88, 24, 69, 0.12); color: #7a3e5a; }

        .status-meta { display: flex; flex-direction: column; gap: 4px; font-size: 0.7rem; color: var(--text-muted); font-family: var(--font-mono); }

        .content {
            display: grid;
            grid-template-columns: 320px 1fr;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: var(--border);
        }

        .sidebar {
            background: var(--bg-sand);
            padding: var(--space-lg);
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-faint);
            margin-bottom: var(--space-sm);
            padding-bottom: var(--space-xs);
            border-bottom: 1px solid var(--border);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-sm); margin-bottom: var(--space-lg); }
        .stat-box { background: var(--bg-card); padding: var(--space-sm); border-radius: 10px; box-shadow: var(--shadow); }
        .stat-label { font-size: 0.6rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
        .stat-value { font-size: 1.4rem; font-weight: 700; font-family: var(--font-mono); color: var(--accent-olive); }
        .stat-value.stale { color: var(--text-faint); }

        .status-card {
            background: var(--bg-card);
            padding: var(--space-md);
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
        }

        .status-row { display: flex; justify-content: space-between; font-size: 0.75rem; font-family: var(--font-mono); color: var(--text-muted); }
        .status-row strong { color: var(--text-ink); }

        .group-list { display: flex; flex-direction: column; gap: var(--space-sm); }
        .group-item {
            background: var(--bg-card);
            padding: var(--space-sm);
            border-radius: 10px;
            border: 1px solid transparent;
            box-shadow: var(--shadow);
        }
        .group-item.active { border-color: rgba(42, 157, 143, 0.4); }
        .group-name { font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; }
        .group-detail { font-size: 0.7rem; font-family: var(--font-mono); color: var(--text-muted); display: flex; align-items: center; gap: var(--space-sm); flex-wrap: wrap; }
        .latency-good { color: var(--accent-teal); }
        .latency-slow { color: var(--accent-olive); }
        .latency-bad { color: var(--accent-coral); }
        .subtag-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 0.6rem;
            background: rgba(58, 134, 255, 0.12);
            color: var(--accent-sky);
        }

        .main { background: var(--bg-cream); padding: var(--space-xl); overflow-y: auto; }

        .tabs {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
            flex-wrap: wrap;
        }
        .tab {
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .tab:hover { color: var(--text-ink); border-color: var(--accent-olive); }
        .tab.active { color: #fff; background: var(--accent-olive); border-color: var(--accent-olive); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .table-container {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .table thead { background: #f6ede0; }
        .table th {
            padding: var(--space-sm);
            text-align: left;
            font-weight: 700;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-faint);
        }
        .table td { padding: var(--space-sm); border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.72rem; }
        .table tr:hover { background: #f9f2e6; }

        .log-viewer {
            background: #1d1d1d;
            color: #f5f5f5;
            border-radius: 12px;
            padding: var(--space-md);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            max-height: 450px;
            overflow-y: auto;
        }
        .log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; gap: var(--space-sm); }
        .log-time { color: #bdbdbd; min-width: 120px; font-size: 0.65rem; }
        .log-level { min-width: 60px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; }
        .log-level.info { color: #80b3ff; }
        .log-level.warn { color: #ffb347; }
        .log-level.error { color: #ff7676; }
        .log-message { color: #f5f5f5; }

        .editor-shell {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .editor-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-sm) var(--space-md);
            border-bottom: 1px solid var(--border);
            background: #f6ede0;
        }
        .editor-actions { display: flex; gap: var(--space-sm); align-items: center; }
        .button {
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .button.primary { background: var(--accent-olive); color: #fff; border-color: var(--accent-olive); }
        .button.warn { background: var(--accent-coral); color: #fff; border-color: var(--accent-coral); }
        .button:disabled { opacity: 0.6; cursor: not-allowed; }
        .editor-status { font-size: 0.7rem; color: var(--text-faint); font-family: var(--font-mono); }

        .editor {
            height: 540px;
            font-family: var(--font-mono);
        }

        .empty { text-align: center; padding: var(--space-lg); color: var(--text-faint); font-size: 0.8rem; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-sand); }
        ::-webkit-scrollbar-thumb { background: #d4c3b4; border-radius: 999px; }

        @media (max-width: 1024px) {
            .content { grid-template-columns: 1fr; }
            .sidebar { max-height: 42vh; border-bottom: 1px solid var(--border); }
            .editor { height: 360px; }
        }
    </style>
</head>
<body>
    <div class="top-banner" id="topBanner">
        服务状态异常 - <span id="bannerText">日志未更新</span>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="header-title">DAE Dashboard</div>
            <div class="header-subtitle" id="hostSubtitle">--</div>
        </div>
        <div class="header-right">
            <div class="status-chip online" id="serviceStatus">检查中</div>
            <div class="status-meta">
                <div id="statusLine">systemd: --</div>
                <div id="logLine">log age: --</div>
            </div>
        </div>
    </header>

    <div class="content">
        <aside class="sidebar">
            <div class="section-title">系统概览</div>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-box">
                    <div class="stat-label">总节点</div>
                    <div class="stat-value" id="totalNodes">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">分组</div>
                    <div class="stat-value" id="groupCount">--</div>
                </div>
            </div>

            <div class="section-title">服务状态</div>
            <div class="status-card">
                <div class="status-row"><span>ActiveState</span><strong id="activeState">--</strong></div>
                <div class="status-row"><span>SubState</span><strong id="subState">--</strong></div>
                <div class="status-row"><span>MainPID</span><strong id="mainPid">--</strong></div>
            </div>

            <div class="section-title">分组状态</div>
            <div class="group-list" id="groupList"></div>
        </aside>

        <main class="main">
            <div class="tabs">
                <button class="tab active" data-tab="groups">分组节点</button>
                <button class="tab" data-tab="all-nodes">所有节点</button>
                <button class="tab" data-tab="traffic">流量解析</button>
                <button class="tab" data-tab="connections">连接记录</button>
                <button class="tab" data-tab="dns">DNS解析</button>
                <button class="tab" data-tab="config">配置文件</button>
                <button class="tab" data-tab="logs">日志</button>
            </div>

            <div class="tab-content active" id="tab-groups">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>分组</th>
                                <th>订阅来源</th>
                                <th>拨号器</th>
                                <th>延迟</th>
                                <th>网络</th>
                                <th>节点数</th>
                            </tr>
                        </thead>
                        <tbody id="groupsTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="tab-content" id="tab-all-nodes">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>节点名称</th>
                                <th>订阅</th>
                                <th>延迟</th>
                                <th>所属分组</th>
                            </tr>
                        </thead>
                        <tbody id="nodesTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="tab-content" id="tab-traffic">
                <div class="editor-toolbar" style="margin-bottom: 12px;">
                    <div class="editor-status">按域名筛选</div>
                    <div class="editor-actions">
                        <input class="button" id="trafficSearch" placeholder="例如: google.com" style="min-width: 240px;" />
                    </div>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>域名</th>
                                <th>DNS</th>
                                <th>分组</th>
                                <th>拨号器</th>
                                <th>网络</th>
                            </tr>
                        </thead>
                        <tbody id="trafficTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="tab-content" id="tab-connections">
                <div class="editor-toolbar" style="margin-bottom: 12px;">
                    <div class="editor-status">按域名筛选</div>
                    <div class="editor-actions">
                        <input class="button" id="connSearch" placeholder="例如: openai.com" style="min-width: 240px;" />
                    </div>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>源地址</th>
                                <th>目标地址</th>
                                <th>节点</th>
                                <th>出口</th>
                                <th>网络</th>
                                <th>域名</th>
                            </tr>
                        </thead>
                        <tbody id="connectionsTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="tab-content" id="tab-dns">
                <div class="editor-toolbar" style="margin-bottom: 12px;">
                    <div class="editor-status">按域名筛选</div>
                    <div class="editor-actions">
                        <input class="button" id="dnsSearch" placeholder="例如: api.telegram.org" style="min-width: 240px;" />
                    </div>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>域名</th>
                                <th>DNS服务器</th>
                                <th>网络</th>
                            </tr>
                        </thead>
                        <tbody id="dnsTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="tab-content" id="tab-config">
                <div class="editor-shell">
                    <div class="editor-toolbar">
                        <div class="editor-status" id="configStatus">加载中...</div>
                        <div class="editor-actions">
                            <button class="button warn" id="reloadBtn">重载配置</button>
                            <button class="button primary" id="saveBtn">保存配置</button>
                        </div>
                    </div>
                    <div class="editor" id="editor"></div>
                    <textarea class="editor" id="configFallback" style="display:none; padding: 12px; border: none; outline: none; width: 100%;"></textarea>
                </div>
            </div>

            <div class="tab-content" id="tab-logs">
                <div class="log-viewer" id="logViewer"></div>
            </div>
        </main>
    </div>

    <script type="module">
        let EditorState;
        let EditorView;
        let lineNumbers;
        let highlightActiveLineGutter;
        let history;
        let historyKeymap;
        let syntaxHighlighting;
        let defaultHighlightStyle;
        let indentOnInput;
        let keymap;
        let codeMirrorReady = false;

        async function loadCodeMirror() {
            try {
                const state = await import("https://cdn.jsdelivr.net/npm/@codemirror/state@6.4.1/+esm");
                const view = await import("https://cdn.jsdelivr.net/npm/@codemirror/view@6.23.0/+esm");
                const commands = await import("https://cdn.jsdelivr.net/npm/@codemirror/commands@6.5.0/+esm");
                const language = await import("https://cdn.jsdelivr.net/npm/@codemirror/language@6.10.0/+esm");
                EditorState = state.EditorState;
                EditorView = view.EditorView;
                lineNumbers = view.lineNumbers;
                highlightActiveLineGutter = view.highlightActiveLineGutter;
                history = commands.history;
                historyKeymap = commands.historyKeymap;
                syntaxHighlighting = language.syntaxHighlighting;
                defaultHighlightStyle = language.defaultHighlightStyle;
                indentOnInput = language.indentOnInput;
                keymap = view.keymap;
                codeMirrorReady = true;
            } catch (e) {
                console.error('CodeMirror load failed', e);
                codeMirrorReady = false;
            }
        }

        const API_BASE = '';
        let ws = null;
        let isStale = false;
        let cachedGroups = {};
        let editorView = null;
        let trafficCache = [];
        let connCache = [];
        let dnsCache = [];
        let activeTab = 'groups';

        document.getElementById('hostSubtitle').textContent = window.location.host;

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
                activeTab = tab.dataset.tab;
                loadTabData(tab.dataset.tab);
            });
        });

        async function loadTabData(tab) {
            if (tab === 'groups') loadGroupsTable();
            if (tab === 'all-nodes') loadNodesTable();
            if (tab === 'traffic') loadTraffic();
            if (tab === 'connections') loadConnections();
            if (tab === 'dns') loadDNS();
            if (tab === 'logs') loadLogs();
            if (tab === 'config') loadConfig();
        }

        async function checkServiceStatus() {
            try {
                const res = await fetch(API_BASE + '/api/status');
                const data = await res.json();
                isStale = !data.log_freshness?.is_fresh;
                updateStatusUI(data);
            } catch (e) {
                isStale = true;
                updateStatusUI({overall_status: 'offline'});
            }
        }

        function updateStatusUI(data) {
            const banner = document.getElementById('topBanner');
            const bannerText = document.getElementById('bannerText');
            const statusEl = document.getElementById('serviceStatus');
            const statusLine = document.getElementById('statusLine');
            const logLine = document.getElementById('logLine');

            const overall = data.overall_status || 'offline';
            statusEl.classList.remove('online', 'degraded', 'offline');
            statusEl.classList.add(overall);
            statusEl.textContent = overall === 'online' ? '在线' : overall === 'degraded' ? '异常' : '离线';

            const systemd = data.systemd || {};
            statusLine.textContent = `systemd: ${systemd.active_state || '--'} / ${systemd.sub_state || '--'}`;
            logLine.textContent = `log age: ${data.log_freshness?.age_seconds ?? '--'}s (距最近日志)`;

            document.getElementById('activeState').textContent = systemd.active_state || '--';
            document.getElementById('subState').textContent = systemd.sub_state || '--';
            document.getElementById('mainPid').textContent = systemd.main_pid || '--';

            if (overall !== 'online') {
                bannerText.textContent = overall === 'offline' ? '服务未运行' : '日志未更新';
                banner.classList.add('show');
            } else if (isStale) {
                bannerText.textContent = '日志未更新';
                banner.classList.add('show');
            } else {
                banner.classList.remove('show');
            }
        }

        async function loadSummary() {
            try {
                const res = await fetch(API_BASE + '/api/summary');
                const data = await res.json();
                document.getElementById('totalNodes').textContent = data.total_nodes ?? '--';
                document.getElementById('groupCount').textContent = data.groups?.length ?? '--';
            } catch (e) {}
        }

        async function loadGroups() {
            try {
                const res = await fetch(API_BASE + '/api/groups');
                const data = await res.json();
                if (data.error) { return; }

                cachedGroups = data;
                const container = document.getElementById('groupList');
                container.innerHTML = '';

                for (const [groupName, group] of Object.entries(data)) {
                    const item = document.createElement('div');
                    item.className = 'group-item';

                    const selected = group.selected && Object.values(group.selected)[0];
                    const latency = selected?.latency || 0;
                    const latencyClass = latency > 500 ? 'latency-bad' : latency > 200 ? 'latency-slow' : 'latency-good';
                    const subtag = group.nodes?.[0]?.subtag || '';
                    const network = group.networks?.[0] || '-';

                    item.innerHTML = `
                        <div class="group-name">${groupName} (${group.nodes?.length || 0})</div>
                        <div class="group-detail">
                            <span class="subtag-badge">${subtag || '-'}</span>
                            <span>${selected?.dialer || '-'}</span>
                            <span>${network}</span>
                            ${latency ? `<span class="${latencyClass}">${latency}ms</span>` : ''}
                        </div>
                    `;
                    container.appendChild(item);
                }
            } catch (e) { console.error(e); }
        }

        async function loadGroupsTable() {
            try {
                const res = await fetch(API_BASE + '/api/groups');
                const data = await res.json();
                if (data.error) { return; }

                const tbody = document.getElementById('groupsTable');
                tbody.innerHTML = '';

                for (const [groupName, group] of Object.entries(data)) {
                    const selected = group.selected && Object.values(group.selected)[0];
                    const latency = selected?.latency || 0;
                    const latencyClass = latency > 500 ? 'latency-bad' : latency > 200 ? 'latency-slow' : 'latency-good';
                    const subtag = group.nodes?.[0]?.subtag || '-';
                    const network = group.networks?.join(', ') || '-';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${groupName}</td>
                        <td><span class="subtag-badge">${subtag}</span></td>
                        <td>${selected?.dialer || '-'}</td>
                        <td><span class="${latencyClass}">${latency}ms</span></td>
                        <td>${network}</td>
                        <td>${group.nodes?.length || 0}</td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch (e) { console.error(e); }
        }

        async function loadNodesTable() {
            try {
                const res = await fetch(API_BASE + '/api/nodes');
                const data = await res.json();
                if (data.error) { return; }

                const tbody = document.getElementById('nodesTable');
                tbody.innerHTML = '';

                for (const [key, node] of Object.entries(data.nodes || {})) {
                    const latency = node.latency || 0;
                    const latencyClass = latency > 500 ? 'latency-bad' : latency > 200 ? 'latency-slow' : 'latency-good';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${node.name}</td>
                        <td><span class="subtag-badge">${node.subtag}</span></td>
                        <td><span class="${latencyClass}">${latency}ms</span></td>
                        <td>${node.groups?.join(', ') || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch (e) { console.error(e); }
        }

        async function loadTraffic() {
            try {
                const res = await fetch(API_BASE + '/api/traffic?limit=200');
                const data = await res.json();
                if (data.error) { return; }
                trafficCache = data.records || [];
                const tbody = document.getElementById('trafficTable');
                tbody.innerHTML = '';

                const query = (document.getElementById('trafficSearch').value || '').trim().toLowerCase();
                const rows = query ? trafficCache.filter(r => (r.host || '').toLowerCase().includes(query)) : trafficCache;
                for (const rec of rows) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${rec.host}</td>
                        <td>${rec.dns}</td>
                        <td>${rec.group}</td>
                        <td>${rec.dialer}</td>
                        <td>${rec.network}</td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch (e) { console.error(e); }
        }

        async function loadConnections() {
            try {
                const res = await fetch(API_BASE + '/api/connections?limit=200');
                const data = await res.json();
                if (data.error) { return; }
                connCache = data.connections || [];
                const tbody = document.getElementById('connectionsTable');
                tbody.innerHTML = '';

                const query = (document.getElementById('connSearch').value || '').trim().toLowerCase();
                const rows = query ? connCache.filter(r => (r.domain || '').toLowerCase().includes(query)) : connCache;
                for (const conn of rows) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${conn.src_ip}:${conn.src_port}</td>
                        <td>${conn.dst_ip}:${conn.dst_port}</td>
                        <td>${conn.dialer || '-'}</td>
                        <td>${conn.outbound || '-'}</td>
                        <td>${conn.network || '-'}</td>
                        <td>${conn.domain || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch (e) { console.error(e); }
        }

        async function loadDNS() {
            try {
                const res = await fetch(API_BASE + '/api/dns?limit=200');
                const data = await res.json();
                if (data.error) { return; }
                dnsCache = data.queries || [];
                const tbody = document.getElementById('dnsTable');
                tbody.innerHTML = '';

                const q = (document.getElementById('dnsSearch').value || '').trim().toLowerCase();
                const rows = q ? dnsCache.filter(r => (r.qname || '').toLowerCase().includes(q)) : dnsCache;
                for (const query of rows) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${query.qname}</td>
                        <td>${query.dialer}</td>
                        <td>${query.network}</td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch (e) { console.error(e); }
        }

        async function loadLogs() {
            try {
                const res = await fetch(API_BASE + '/api/logs?limit=200');
                const data = await res.json();
                const container = document.getElementById('logViewer');
                container.innerHTML = '';
                const logs = (data.logs || []).slice().reverse();
                for (const log of logs) {
                    const entry = document.createElement('div');
                    entry.className = 'log-entry';
                    entry.innerHTML = `<span class="log-time">${log.time}</span><span class="log-level ${log.level}">${log.level}</span><span class="log-message">${log.message}</span>`;
                    container.appendChild(entry);
                }
                container.scrollTop = 0;
            } catch (e) { console.error(e); }
        }

        function setupEditor(initialText) {
            try {
                if (!codeMirrorReady || !EditorView) {
                    throw new Error('CodeMirror not ready');
                }
                const editorTheme = EditorView.theme({
                    "&": { backgroundColor: "#fffaf2", color: "#1a1a1a", height: "100%" },
                    ".cm-content": { fontFamily: "IBM Plex Mono, monospace", fontSize: "13px" },
                    ".cm-gutters": { backgroundColor: "#f6ede0", color: "#8a8174", border: "none" },
                    ".cm-activeLineGutter": { backgroundColor: "#efe4d4" },
                    ".cm-activeLine": { backgroundColor: "#f9f2e6" },
                }, { dark: false });

                editorView = new EditorView({
                    state: EditorState.create({
                        doc: initialText || '',
                        extensions: [
                            lineNumbers(),
                            highlightActiveLineGutter(),
                            history(),
                            indentOnInput(),
                            keymap.of(historyKeymap),
                            syntaxHighlighting(defaultHighlightStyle),
                            editorTheme
                        ]
                    }),
                    parent: document.getElementById('editor')
                });
                document.getElementById('configFallback').style.display = 'none';
                document.getElementById('editor').style.display = 'block';
            } catch (e) {
                const editor = document.getElementById('editor');
                const fallback = document.getElementById('configFallback');
                editor.style.display = 'none';
                fallback.style.display = 'block';
                fallback.value = initialText || '';
                editorView = null;
            }
        }

        async function loadConfig() {
            const status = document.getElementById('configStatus');
            status.textContent = '加载中...';
            try {
                const res = await fetch(API_BASE + '/api/config');
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                const data = await res.json();
                if (data.error) {
                    status.textContent = `加载失败: ${data.error} (可设置环境变量 ${data.env_key || 'DAE_CONFIG_PATH'})`;
                    return;
                }
                if (!('content' in data)) {
                    status.textContent = `加载失败: 返回数据无 content (可设置环境变量 ${data.env_key || 'DAE_CONFIG_PATH'})`;
                    return;
                }
                status.textContent = `${data.path}  |  ${Math.round(data.size / 1024)}KB`;
                if (!editorView) {
                    setupEditor(data.content || '');
                } else {
                    editorView.dispatch({
                        changes: { from: 0, to: editorView.state.doc.length, insert: data.content || '' }
                    });
                }
            } catch (e) {
                console.error(e);
                status.textContent = `加载失败: ${e.message || '未知错误'}`;
            }
        }

        async function saveConfig() {
            const status = document.getElementById('configStatus');
            status.textContent = '保存中...';
            try {
                const content = editorView ? editorView.state.doc.toString() : document.getElementById('configFallback').value;
                const res = await fetch(API_BASE + '/api/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                const data = await res.json();
                status.textContent = data.ok ? '保存成功' : `保存失败: ${data.error || '未知错误'}`;
            } catch (e) {
                status.textContent = '保存失败';
            }
        }

        async function reloadConfig() {
            const status = document.getElementById('configStatus');
            status.textContent = '重载中...';
            try {
                const res = await fetch(API_BASE + '/api/reload', { method: 'POST' });
                const data = await res.json();
                status.textContent = data.ok ? '重载完成' : `重载失败: ${data.stderr || '未知错误'}`;
            } catch (e) {
                status.textContent = '重载失败';
            }
        }

        document.getElementById('saveBtn').addEventListener('click', saveConfig);
        document.getElementById('reloadBtn').addEventListener('click', reloadConfig);
        document.getElementById('trafficSearch').addEventListener('input', () => loadTraffic());
        document.getElementById('connSearch').addEventListener('input', () => loadConnections());
        document.getElementById('dnsSearch').addEventListener('input', () => loadDNS());

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + window.location.host + '/ws');
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.status) {
                        updateStatusUI({ overall_status: data.status.overall, log_freshness: { age_seconds: data.status.age_seconds }, systemd: data.status.systemd });
                    }
                } catch (e) {}
            };
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        await loadCodeMirror();
        checkServiceStatus();
        loadSummary();
        loadGroups();
        loadGroupsTable();
        connectWebSocket();
        setInterval(() => {
            checkServiceStatus();
            loadSummary();
            loadGroups();
            if (activeTab === 'groups') loadGroupsTable();
            if (activeTab === 'all-nodes') loadNodesTable();
            if (activeTab === 'traffic') loadTraffic();
            if (activeTab === 'connections') loadConnections();
            if (activeTab === 'dns') loadDNS();
            if (activeTab === 'logs') loadLogs();
            if (activeTab === 'config') loadConfig();
        }, 5000);
    </script>
</body>
</html>
